<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星轨博客 | 个人主页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="aurora aurora-a"></div>
  <div class="aurora aurora-b"></div>

  <header class="topbar glass">
    <a class="logo" href="#">STARLOG</a>
    <nav>
      <a href="#posts">文章</a>
      <a href="#about">关于</a>
      <a href="#contact">联系</a>
    </nav>
  </header>

  <main>
    <section class="hero reveal">
      <p class="kicker">PERSONAL BLOG / 2026</p>
      <h1>把日常写成一颗颗会发光的星。</h1>
      <p class="lead">这里记录我的技术实验、读书笔记和生活灵感。页面简洁，但不平淡。</p>
      <a class="cta" href="#posts">开始阅读</a>
    </section>

    <section id="posts" class="section reveal">
      <div class="section-head">
        <h2>精选文章</h2>
        <div class="chips" id="chips">
          <button class="chip active" data-filter="all">全部</button>
          <button class="chip" data-filter="tech">技术</button>
          <button class="chip" data-filter="life">生活</button>
          <button class="chip" data-filter="notes">笔记</button>
        </div>
      </div>
      <div class="post-grid" id="postGrid"></div>
    </section>

    <section id="about" class="section about reveal">
      <h2>关于我</h2>
      <p>我是一个喜欢折腾的创作者，白天写代码，晚上写字。这个站点用于沉淀想法，也记录一路上的小作品。</p>
      <ul>
        <li>关注方向：Web 前端、产品设计、效率系统</li>
        <li>更新频率：每周 1-2 篇</li>
        <li>座右铭：做有质感的长期主义者</li>
      </ul>
    </section>
  </main>

  <footer id="contact" class="footer glass reveal">
    <p>© 2026 STARLOG</p>
    <div class="links">
      <a href="#">GitHub</a>
      <a href="#">X</a>
      <a href="#">Email</a>
    </div>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
