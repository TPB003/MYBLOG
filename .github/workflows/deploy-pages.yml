name: Deploy Blog to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - blog/**
      - scripts/generate-books-from-md.mjs
      - scripts/generate-knowledge-from-md.mjs
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate knowledge cards from markdown
        env:
          TPBLOG_TRANSLATE_PROVIDER: ${{ vars.TPBLOG_TRANSLATE_PROVIDER }}
          TPBLOG_OPENAI_API_KEY: ${{ secrets.TPBLOG_OPENAI_API_KEY }}
          TPBLOG_OPENAI_MODEL: ${{ vars.TPBLOG_OPENAI_MODEL }}
          TPBLOG_OPENAI_BASE_URL: ${{ vars.TPBLOG_OPENAI_BASE_URL }}
        run: node scripts/generate-knowledge-from-md.mjs

      - name: Generate books from markdown
        env:
          TPBLOG_TRANSLATE_PROVIDER: ${{ vars.TPBLOG_TRANSLATE_PROVIDER }}
          TPBLOG_OPENAI_API_KEY: ${{ secrets.TPBLOG_OPENAI_API_KEY }}
          TPBLOG_OPENAI_MODEL: ${{ vars.TPBLOG_OPENAI_MODEL }}
          TPBLOG_OPENAI_BASE_URL: ${{ vars.TPBLOG_OPENAI_BASE_URL }}
        run: node scripts/generate-books-from-md.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./blog

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
