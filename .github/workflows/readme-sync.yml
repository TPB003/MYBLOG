name: Sync README

on:
  push:
    branches:
      - main
      - master
    paths:
      - blog/**
      - scripts/generate-knowledge-from-md.mjs
      - scripts/sync-readme.mjs
      - .github/workflows/readme-sync.yml
      - README.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-readme:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate knowledge cards from markdown
        run: node scripts/generate-knowledge-from-md.mjs

      - name: Sync README files
        run: node scripts/sync-readme.mjs

      - name: Commit changes if needed
        run: |
          if git diff --quiet; then
            echo "No README changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md blog/README.md
          git add -A blog/assets/js/data/knowledge-generated.js blog/knowledge/generated-*.html || true
          git commit -m "chore: sync readme and generated knowledge cards"
          git push
